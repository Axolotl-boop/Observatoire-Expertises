name: Synchronisation SharePoint

# Récupère les .md depuis SharePoint et les committe dans `content/`.
# Un push sur le dépôt déclenche automatiquement un redéploiement Vercel.

on:
  schedule:
    - cron: "0 * * * *" # toutes les heures
  workflow_dispatch: {} # déclenchement manuel possible

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      MAIL_SERVER: ${{ secrets.MAIL_SERVER }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Synchroniser depuis SharePoint
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          SHAREPOINT_HOST: ${{ secrets.SHAREPOINT_HOST }}
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
          SHAREPOINT_DRIVE: ${{ secrets.SHAREPOINT_DRIVE }}
          SHAREPOINT_FOLDER: ${{ secrets.SHAREPOINT_FOLDER }}
        run: node scripts/sync-sharepoint.mjs

      - name: Détecter un nouveau digest mensuel
        id: detect
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/notify-digest.mjs

      - name: Notifier le nouveau digest par email
        if: steps.detect.outputs.new_month != '' && env.MAIL_SERVER != ''
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          from: Observatoire des Expertises <${{ secrets.MAIL_USERNAME }}>
          to: ${{ secrets.MAIL_USERNAME }}
          bcc: ${{ steps.detect.outputs.recipients || secrets.MAIL_TO }}
          subject: "Le digest de ${{ steps.detect.outputs.month_label }} est disponible"
          html_body: |
            <p>Bonjour,</p>
            <p>Le nouveau digest mensuel (<strong>${{ steps.detect.outputs.month_label }}</strong>)
            est disponible sur l'Observatoire des Expertises.</p>
            <p><a href="${{ secrets.SITE_URL }}">Ouvrir l'Observatoire des Expertises</a></p>

      - name: Committer les changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --cached --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "chore: synchronisation du contenu SharePoint"
            git push
          fi
