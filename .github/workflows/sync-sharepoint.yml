name: Synchronisation SharePoint

# Récupère les .md depuis SharePoint et les committe dans `content/`.
# Un push sur le dépôt déclenche automatiquement un redéploiement Vercel.

on:
  schedule:
    - cron: "0 * * * *" # toutes les heures
  workflow_dispatch: {} # déclenchement manuel possible

permissions:
  contents: write

# Empêche deux synchros de se chevaucher (conflits sur le git push) : une
# nouvelle exécution attend la fin de la précédente au lieu de tourner en //.
concurrency:
  group: sharepoint-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Synchroniser depuis SharePoint
        env:
          TENANT_ID: ${{ secrets.TENANT_ID }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          SHAREPOINT_HOST: ${{ secrets.SHAREPOINT_HOST }}
          SHAREPOINT_SITE: ${{ secrets.SHAREPOINT_SITE }}
          SHAREPOINT_DRIVE: ${{ secrets.SHAREPOINT_DRIVE }}
          SHAREPOINT_FOLDER: ${{ secrets.SHAREPOINT_FOLDER }}
        run: node scripts/sync-sharepoint.mjs

      - name: Détecter un nouveau digest mensuel
        id: detect
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: node scripts/notify-digest.mjs

      - name: Notifier le nouveau digest par email (Resend)
        if: steps.detect.outputs.new_month != '' && env.RESEND_API_KEY != ''
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM: ${{ secrets.RESEND_FROM }}
          RECIPIENTS: ${{ steps.detect.outputs.recipients }}
          MONTH_LABEL: ${{ steps.detect.outputs.month_label }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node scripts/send-recap.mjs

      - name: Committer les changements
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add content/
          if git diff --cached --quiet; then
            echo "Aucun changement à committer."
          else
            git commit -m "chore: synchronisation du contenu SharePoint"
            git push
          fi
