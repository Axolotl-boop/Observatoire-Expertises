version: 2
updates:
  # Dépendances npm : hebdomadaire, groupées pour limiter le bruit de PR.
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      react:
        patterns: ["react", "react-dom", "@types/react", "@types/react-dom"]
      next:
        patterns: ["next", "eslint-config-next", "next-auth"]
      remark-rehype:
        patterns: ["remark*", "rehype*", "unified"]
      dev-tooling:
        patterns: ["eslint*", "@eslint/*", "typescript", "@types/*"]

  # Actions GitHub : garde le pipeline à jour (et corrigé côté sécurité).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
